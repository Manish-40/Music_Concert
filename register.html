<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
</head>
<body>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 400px;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    form {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 6px;
        font-weight: 600;
        color: #555;
    }

    input {
        padding: 12px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #4caf50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }

    button {
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: #45a049;
    }

    .status {
        margin-top: 12px;
        text-align: center;
        color: #444;
        min-height: 20px;
    }

    p {
        margin-top: 15px;
        text-align: center;
    }

    a {
        color: #4caf50;
        text-decoration: none;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
<div class="container">
    <form id="authForm" data-mode="register">
        <h2>Create Account</h2>

        <label for="name">Name:</label>
        <input
            type="text"
            id="name"
            name="name"
            required
        >

        <label for="email">Email:</label>
        <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
        >

        <label for="password">Password:</label>
        <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="new-password"
        >

        <label for="confirmPassword">Confirm Password:</label>
        <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            required
            autocomplete="new-password"
        >

        <button type="submit">Register</button>

        <p class="status" id="authStatus"></p>

        <p>
            Already registered?
            <a href="login.html">Login</a>
        </p>
    </form>
</div>

<script src="/config.js"></script>
<script src="auth-form.js"></script>

</body>
</html>
