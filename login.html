<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 400px;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    form {
        display: flex;
        flex-direction: column;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
        font-size: 28px;
    }

    label {
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 600;
        color: #555;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
    }

    input:focus {
        border-color: #4caf50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }

    button {
        padding: 12px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    button:hover {
        background-color: #45a049;
    }

    .status {
        margin-top: 12px;
        min-height: 20px;
        text-align: center;
        color: #444;
        font-size: 14px;
    }

    p {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    a {
        color: #4caf50;
        text-decoration: none;
        font-weight: 600;
    }

    a:hover {
        text-decoration: underline;
    }

    @media (max-width: 480px) {
        .container {
            padding: 20px;
        }

        h2 {
            font-size: 24px;
        }
    }
</style>
<div class="container">
    <form id="authForm" data-mode="login">
        <h2>Login</h2>

        <label for="email">Email:</label>
        <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
        >

        <label for="password">Password:</label>
        <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
        >

        <button type="submit">Login</button>

        <p class="status" id="authStatus"></p>

        <p>
            Need an account?
            <a href="register.html">Register</a>
        </p>
    </form>
</div>

<script src="/config.js"></script>
<script src="auth-form.js"></script>

</body>
</html>
